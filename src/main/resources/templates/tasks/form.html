<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: layout(~{::section}, ${mode=='create' ? 'Tạo công việc' : 'Sửa công việc'}, ~{::div[@id='bc']})}">

<div id="bc">
  <div class="page-pretitle text-muted">CÔNG VIỆC</div>
  <h2 class="page-title" th:text="${mode=='create' ? 'Tạo công việc mới' : 'Sửa công việc'}">Task</h2>
</div>

<section>
  <div class="card">
    <div class="card-body">

      <div class="form-section-title">
        <i class="ti ti-checkup-list" style="font-size:18px; color:#1fd1b9;"></i>
        <span th:text="${mode=='create' ? 'Thông tin công việc' : 'Cập nhật công việc'}">Thông tin công việc</span>
      </div>

      <form th:action="${mode=='create'} ? @{/projects/{projectId}/tasks(projectId=${projectId})} : @{/tasks/{id}/edit(id=${task.id})}"
            th:object="${task}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="projectId" th:value="${projectId}" th:if="${mode=='edit'}"/>

        <!-- Tiêu đề -->
        <div class="mb-4">
          <label class="form-label">Tiêu đề <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{title}" placeholder="Nhập tiêu đề công việc...">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <!-- Mô tả -->
        <div class="mb-4">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" rows="4" th:field="*{description}" placeholder="Mô tả chi tiết công việc..."></textarea>
        </div>

        <div class="row g-3">

          <!-- Loại công việc -->
          <div class="col-md-4">
            <label class="form-label">Loại công việc</label>
            <select class="form-select" th:field="*{taskType}">
              <option th:each="t : ${allTaskTypes}"
                      th:value="${t}"
                      th:text="${t.label}">
              </option>
            </select>
          </div>

          <!-- Ưu tiên -->
          <div class="col-md-4">
            <label class="form-label">Ưu tiên</label>
            <select class="form-select" th:field="*{priority}">
              <option th:each="p : ${allPriorities}"
                      th:value="${p}"
                      th:text="${p.label}">
              </option>
            </select>
          </div>

          <!-- Trạng thái: chỉ hiện khi edit -->
          <div class="col-md-4" th:if="${mode == 'edit'}">
            <label class="form-label">Trạng thái</label>
            <select class="form-select" th:field="*{status}">
              <option th:each="s : ${allStatuses}"
                      th:value="${s}"
                      th:text="${s.label}">
              </option>
            </select>
          </div>

          <!-- Nếu create thì show trạng thái mặc định -->
          <div class="col-md-4" th:if="${mode == 'create'}">
            <label class="form-label">Trạng thái</label>
            <input type="text" class="form-control" value="Cần làm" disabled>
            <div class="field-hint">Công việc mới sẽ mặc định ở trạng thái “Cần làm”.</div>
          </div>

          <!-- Người phụ trách -->
          <div class="col-md-6">
            <label class="form-label">Người phụ trách</label>
            <select class="form-select" name="assigneeId">
              <option value="">— Chưa giao —</option>
              <option th:each="u : ${participants}"
                      th:value="${u.id}"
                      th:text="${u.fullName + ' (' + u.email + ')'}"
                      th:selected="${task.assignee != null and task.assignee.id == u.id}">
              </option>
            </select>
          </div>

          <!-- Deadline -->
          <div class="col-md-6">
            <label class="form-label">Deadline</label>
            <input type="date" class="form-control" th:field="*{dueDate}">
          </div>

        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary" type="submit">
            <i class="ti ti-device-floppy me-1" style="font-size:16px;"></i>
            Lưu công việc
          </button>
          <a class="btn btn-outline-secondary" th:href="@{/projects/{id}(id=${projectId})}">
            Hủy
          </a>
        </div>

      </form>

    </div>
  </div>
</section>
</html>
