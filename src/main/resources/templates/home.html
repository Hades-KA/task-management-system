<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public :: layout(~{::section}, 'Trang chủ')}">
<section>
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card mt-4">
        <div class="card-body p-4">
          <h2 class="mb-2">QLCV - Website quản lý công việc</h2>
          <p class="text-muted">
            Quản lý Project, Task, theo dõi tiến độ, deadline, lọc trễ hạn. Có phân quyền User/Admin.
          </p>

          <div class="d-flex gap-2 mt-3">
            <a class="btn btn-primary" th:href="@{/login}">Đăng nhập</a>
            <a class="btn btn-outline-success" th:href="@{/register}">Đăng ký</a>
          </div>

          <hr class="my-4">

          <div class="row">
            <div class="col-md-4">
              <div class="fw-semibold">Project</div>
              <div class="text-muted">Tạo dự án và quản lý theo ngữ cảnh.</div>
            </div>
            <div class="col-md-4">
              <div class="fw-semibold">Task workflow</div>
              <div class="text-muted">TODO → IN_PROGRESS → DONE.</div>
            </div>
            <div class="col-md-4">
              <div class="fw-semibold">Deadline & Overdue</div>
              <div class="text-muted">Theo dõi trễ hạn, ưu tiên công việc.</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
</html>
