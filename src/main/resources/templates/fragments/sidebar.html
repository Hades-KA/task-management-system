<div th:fragment="sidebar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <div class="container-fluid">
    <h1 class="navbar-brand navbar-brand-autodark py-3">
      <a th:href="@{/dashboard}" class="text-decoration-none">
        <i class="ti ti-brand-stackshare me-2" style="font-size:20px;"></i> QLCV
      </a>
    </h1>

    <div class="collapse navbar-collapse" id="sidebar-menu">
      <ul class="navbar-nav pt-lg-2" id="sidebarNav">

        <!-- Dashboard -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/dashboard}" data-page="/dashboard">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-chart-pie" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Thống kê</span>
          </a>
        </li>

        <!-- Projects -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/projects}" data-page="/projects">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-folder" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Dự án</span>
          </a>
        </li>

        <!-- Kanban -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/kanban}" data-page="/ui/kanban">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-layout-kanban" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Kanban</span>
          </a>
        </li>

        <!-- List -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/list}" data-page="/ui/list">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-list-details" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Danh sách</span>
          </a>
        </li>

        <!-- Calendar -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/calendar}" data-page="/ui/calendar">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-calendar" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Lịch trình</span>
          </a>
        </li>

        <!-- History -->
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/history}" data-page="/ui/history">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-history" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Lịch sử</span>
          </a>
        </li>

        <!-- Admin Users -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/users}" data-page="/admin/users">
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              <i class="ti ti-users" style="font-size:18px;"></i>
            </span>
            <span class="nav-link-title">Người dùng</span>
          </a>
        </li>

      </ul>

      <div class="mt-auto pt-4 px-2">
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-outline-light w-100" type="submit">
            <i class="ti ti-logout me-2" style="font-size:16px;"></i> Đăng xuất
          </button>
        </form>

        <div class="text-muted small mt-3">
          Được thực hiện bởi: <b style="color:#1fd1b9;">QLCV Team</b>
        </div>
      </div>

    </div>
  </div>

  <!-- Active menu JS -->
  <script>
    (function () {
      const path = window.location.pathname;
      document.querySelectorAll('#sidebarNav .nav-link').forEach(link => {
        const page = link.getAttribute('data-page');
        if (!page) return;

        // active theo prefix
        if (path === page || path.startsWith(page + "/")) {
          link.classList.add('active');
        }
      });
    })();
  </script>
</div>
