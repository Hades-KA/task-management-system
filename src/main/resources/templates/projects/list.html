<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: layout(~{::section}, 'Dự án', ~{::div[@id='bc']})}">

<div id="bc">
  <div class="page-pretitle text-muted">QUẢN LÝ</div>
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h2 class="page-title mb-0">Danh sách dự án</h2>

    <a class="btn btn-primary" th:href="@{/projects/new}">
      <i class="ti ti-plus" style="font-size:16px;"></i>
      Tạo dự án
    </a>
  </div>
</div>

<section>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-vcenter card-table table-hover">
        <thead>
        <tr>
          <th>Tên dự án</th>
          <th style="width:140px;">Chủ sở hữu</th>
          <th style="width:110px;">Thành viên</th>
          <th style="width:160px;">Ngày tạo</th>
          <th class="text-end" style="width:220px;">Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${projects}">
          <td>
            <a th:href="@{/projects/{id}(id=${p.id})}"
               class="fw-semibold text-reset text-decoration-none"
               th:text="${p.name}">
              Project
            </a>

            <div class="text-muted small"
                 th:if="${p.description != null and !p.description.isBlank()}"
                 th:text="${p.description}">
              Desc
            </div>
          </td>

          <td>
            <span th:text="${p.owner.fullName}">Admin</span>
          </td>

          <td>
            <span class="badge bg-secondary-lt"
                  th:text="${p.members.size() + 1} + ' người'">
              1 người
            </span>
          </td>

          <td th:text="${#temporals.format(p.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>

          <td class="text-end">
            <div class="d-inline-flex gap-1 flex-wrap justify-content-end">
              <a class="btn btn-sm btn-outline-secondary"
                 th:href="@{/projects/{id}(id=${p.id})}">
                Mở
              </a>

              <!-- Chỉ owner mới sửa/xóa -->
              <a class="btn btn-sm btn-outline-primary"
                 th:href="@{/projects/{id}/edit(id=${p.id})}"
                 th:if="${#authentication.name == p.owner.email}">
                Sửa
              </a>

              <form class="d-inline"
                    th:action="@{/projects/{id}/delete(id=${p.id})}"
                    method="post"
                    onsubmit="return confirm('Xóa dự án này?');"
                    th:if="${#authentication.name == p.owner.email}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
              </form>
            </div>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(projects)}">
          <td colspan="5" class="text-center text-muted py-4">Chưa có dự án nào</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</section>
</html>
