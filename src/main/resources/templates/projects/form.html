<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: layout(~{::section}, ${mode=='create' ? 'Tạo dự án' : 'Sửa dự án'}, ~{::div[@id='bc']})}">

<div id="bc">
  <div class="page-pretitle text-muted">DỰ ÁN</div>
  <h2 class="page-title" th:text="${mode=='create' ? 'Tạo dự án mới' : 'Sửa dự án'}">Project</h2>
</div>

<section>
  <div class="card">
    <div class="card-body">

      <div class="form-section-title">
        <i class="ti ti-folder-plus me-2" style="font-size:18px; color:#1fd1b9;"></i>
        <span th:text="${mode=='create' ? 'Thông tin dự án' : 'Cập nhật thông tin dự án'}">Thông tin dự án</span>
      </div>

      <form th:action="${mode=='create'} ? @{/projects} : @{/projects/{id}/edit(id=${project.id})}"
            th:object="${project}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-4">
          <label class="form-label">Tên dự án <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Đồ án J2EE">
          <div class="field-hint">Tên hiển thị chính của dự án trong hệ thống.</div>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}"></div>
        </div>

        <div class="mb-4">
          <label class="form-label">Mô tả dự án</label>
          <textarea class="form-control" rows="5" th:field="*{description}"
                    placeholder="Mô tả ngắn gọn mục tiêu, phạm vi hoặc nội dung chính của dự án..."></textarea>
          <div class="field-hint">Bạn có thể mô tả mục tiêu, chức năng hoặc ghi chú quan trọng.</div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">
            <i class="ti ti-device-floppy me-1" style="font-size:16px;"></i>
            Lưu dự án
          </button>

          <a class="btn btn-outline-secondary" th:href="@{/projects}">
            Hủy
          </a>
        </div>

      </form>

    </div>
  </div>
</section>
</html>
