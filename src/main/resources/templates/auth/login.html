<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public :: layout(~{::section}, 'Đăng nhập')}">

<section class="public-hero">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5 col-xl-4">
      <div class="public-auth-card">
        <div class="card-body">

          <h2 class="public-auth-title">Đăng nhập</h2>
          <div class="public-auth-subtitle">
            Truy cập vào hệ thống để quản lý công việc, dự án và kế hoạch AI.
          </div>

          <div class="alert alert-success" th:if="${param.registered}">
            Đăng ký thành công. Bạn có thể đăng nhập ngay bây giờ.
          </div>

          <div class="alert alert-info" th:if="${param.logout}">
            Bạn đã đăng xuất khỏi hệ thống.
          </div>

          <div class="alert alert-danger" th:if="${param.error}">
            Sai email hoặc mật khẩu.
          </div>

          <form th:action="@{/login}" method="post" class="public-auth">
            <div th:replace="~{fragments/csrf :: csrf}"></div>

            <div class="mb-3">
              <label class="public-label">Email</label>
              <input class="form-control" name="username" placeholder="Nhập email..." required>
            </div>

            <div class="mb-3">
              <label class="public-label">Mật khẩu</label>
              <input class="form-control" type="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <button class="btn btn-primary w-100" type="submit">
              <i class="ti ti-login-2 me-1"></i> Đăng nhập
            </button>
          </form>

          <div class="public-link-row">
            Chưa có tài khoản?
            <a th:href="@{/register}">Đăng ký</a>
          </div>

          <div class="public-demo-box">
            Admin demo: <b>admin@gmail.com / 123456</b>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
</html>
