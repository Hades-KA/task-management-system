<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public :: layout(~{::section}, 'Đăng nhập')}">
<section>
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card mt-5">
        <div class="card-body">
          <h3 class="mb-3">Đăng nhập</h3>

          <div class="alert alert-success" th:if="${param.registered}">Đăng ký thành công.</div>
          <div class="alert alert-info" th:if="${param.logout}">Bạn đã đăng xuất.</div>
          <div class="alert alert-danger" th:if="${param.error}">Sai email hoặc mật khẩu.</div>

          <form th:action="@{/login}" method="post">
            <div th:replace="~{fragments/csrf :: csrf}"></div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" name="username" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input class="form-control" type="password" name="password" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>

          <div class="mt-3 text-center">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a>
          </div>

          <div class="mt-3 text-muted small">
            Admin demo: <b>admin@gmail.com / 123456</b>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</html>
