<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public :: layout(~{::section}, 'Đăng ký')}">
<section>
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card mt-5">
        <div class="card-body">
          <h3 class="mb-3">Đăng ký</h3>

          <form th:action="@{/register}" th:object="${form}" method="post">
            <div th:replace="~{fragments/csrf :: csrf}"></div>

            <div class="mb-3">
              <label class="form-label">Họ tên</label>
              <input class="form-control" th:field="*{fullName}">
              <div class="text-danger" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" th:field="*{email}">
              <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input class="form-control" type="password" th:field="*{password}">
              <div class="text-danger" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Nhập lại mật khẩu</label>
              <input class="form-control" type="password" th:field="*{confirmPassword}">
              <div class="text-danger" th:errors="*{confirmPassword}"></div>
            </div>

            <button class="btn btn-success w-100" type="submit">Tạo tài khoản</button>
          </form>

          <div class="mt-3 text-center">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</html>
