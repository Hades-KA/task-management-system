<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public :: layout(~{::section}, 'Đăng ký')}">

<section class="public-hero">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 col-xl-5">
      <div class="public-auth-card">
        <div class="card-body">

          <h2 class="public-auth-title">Đăng ký tài khoản</h2>
          <div class="public-auth-subtitle">
            Tạo tài khoản để bắt đầu quản lý dự án, công việc và sử dụng các tính năng của hệ thống.
          </div>

          <form th:action="@{/register}" th:object="${form}" method="post" class="public-auth">
            <div th:replace="~{fragments/csrf :: csrf}"></div>

            <div class="mb-3">
              <label class="public-label">Họ tên</label>
              <input class="form-control" th:field="*{fullName}" placeholder="Nhập họ tên...">
              <div class="text-danger" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
              <label class="public-label">Email</label>
              <input class="form-control" th:field="*{email}" placeholder="Nhập email...">
              <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
              <label class="public-label">Mật khẩu</label>
              <input class="form-control" type="password" th:field="*{password}" placeholder="Nhập mật khẩu...">
              <div class="text-danger" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
              <label class="public-label">Nhập lại mật khẩu</label>
              <input class="form-control" type="password" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu...">
              <div class="text-danger" th:errors="*{confirmPassword}"></div>
            </div>

            <button class="btn btn-success w-100" type="submit">
              <i class="ti ti-user-plus me-1"></i> Tạo tài khoản
            </button>
          </form>

          <div class="public-link-row">
            Đã có tài khoản?
            <a th:href="@{/login}">Đăng nhập</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
</html>
